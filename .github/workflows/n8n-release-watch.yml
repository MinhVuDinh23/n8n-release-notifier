name: N8N Release Watch

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new n8n stable release
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash check_n8n_release.sh

      - name: Commit updated state
        run: |
          if ! git diff --quiet known_versions.txt; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add known_versions.txt
            git commit -m "chore: cap nhat known_versions.txt [skip ci]"
            git push
          else
            echo "Khong co thay doi de commit"
          fi
